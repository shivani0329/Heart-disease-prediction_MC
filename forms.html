<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background-image:url("https://media.licdn.com/dms/image/v2/D4D12AQEgnkBRFbs40w/article-cover_image-shrink_720_1280/B4DZdTZcHlHwAI-/0/1749450868614?e=2147483647&v=beta&t=UNS0ESJ6zVUHSZI9enUhtEmryRlH1v5hd7hJBmnjbc4");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:420px;
            background:rgba(255,255,255,0.9);
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#000601;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
            margin-bottom:5px;
        }

        input[type="number"]{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        input[type="submit"]{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        input[type="submit"]:hover{
            background:#084298;
        }

        .result{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    padding:12px;
    border-radius:8px;
         }
         .success{
    color:#0edd3f;
    background-color:#d4edda;
    border:2px solid #28a745;
         }
         .danger{
    color:#721c24;
    background-color:#f8d7da;
    border:2px solid #dc3545;
         }

    </style>

</head>

<body>

<div class="container">

<h2>Heart Disease Prediction</h2>

<form method="POST">

<label>Gender</label>
<input type="number" name="gender" placeholder="0 = Female, 1 = Male" required>

<label>Impulse</label>
<input type="number" name="impluse" required>

<label>Pressure High</label>
<input type="number" name="pressurehight" required>

<label>Pressure Low</label>
<input type="number" name="pressurelow" required>

<label>Glucose</label>
<input type="number" name="glucose" required>

<label>KCM</label>
<input type="number" name="kcm" required>

<label>Troponin</label>
<input type="number" name="troponin" required>

<input type="submit" value="Predict">

</form>

{% if predicted_result %}

<div class="result">
    {{ predicted_result }}
</div>

{% endif %}

</div>

</body>

</html>
